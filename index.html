<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Palette — 단어가 색채로</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* ─── CSS Variables ─── */
    :root {
      --bg-frosted:         rgba(255, 255, 255, 0.45);
      --bg-frosted-border:  rgba(255, 255, 255, 0.70);
      --text-primary:       #7B78A8;
      --text-secondary:     #9D9BBF;
      --text-muted:         #B8B5D0;
      --text-watermark:     rgba(180, 176, 210, 0.18);
      --text-label:         #6B6898;
      --border-frame:       rgba(180, 175, 215, 0.50);
      --border-frame-inner: rgba(200, 196, 230, 0.30);
      --border-card:        rgba(210, 206, 235, 0.40);
      --border-input:       rgba(180, 175, 215, 0.60);
      --border-input-focus: rgba(150, 145, 200, 0.80);
      --deco-snowflake:     rgba(160, 155, 205, 0.55);
      --deco-sparkle:       rgba(170, 165, 215, 0.65);
      --deco-dot:           rgba(175, 170, 215, 0.25);
      --deco-cross:         rgba(175, 170, 215, 0.45);
      --accent-primary:     #A8A4D4;
      --accent-hover:       #8F8BC0;
      --accent-glow:        rgba(168, 164, 212, 0.30);
      --fs-display:   clamp(2.5rem, 6vw, 4.5rem);
      --fs-watermark: clamp(8rem, 20vw, 18rem);
      --fs-label:     0.75rem;
      --fs-input:     1rem;
      --ls-display:   0.25em;
      --ls-label:     0.12em;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { background: none; border: none; cursor: pointer; font: inherit; }
    input  { font: inherit; }

    /* ─── Body / Background ─── */
    body.page-root {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 70% 20%, rgba(200, 195, 240, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(200, 220, 245, 0.20) 0%, transparent 55%),
        linear-gradient(135deg, #FDFCF8 0%, #F0EDF8 30%, #E8EEF8 60%, #DDE8F5 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      animation: page-fade-in 1.2s ease forwards;
    }

    /* ─── Background Layer ─── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-watermark {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: var(--fs-watermark);
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--text-watermark);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      z-index: 0;
      transition: opacity 0.4s ease;
    }

    /* ─── Ribbon Lines ─── */
    .deco-ribbon {
      position: absolute;
      width: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .deco-ribbon--blue { top: 0;    left: 0; height: 50%; }
    .deco-ribbon--pink { bottom: 0; left: 0; height: 50%; }
    .ribbon-path {
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: ribbon-draw 3s ease-out forwards;
    }
    .deco-ribbon--blue .ribbon-path { animation-delay: 0.5s; }
    .deco-ribbon--pink .ribbon-path { animation-delay: 1.0s; }

    /* ─── Snowflakes ─── */
    .deco-snowflake {
      color: var(--deco-snowflake);
      position: absolute;
      pointer-events: none;
      user-select: none;
      animation: snowflake-float 8s ease-in-out infinite;
      will-change: transform;
      z-index: 2;
    }
    .deco-snowflake--sm { width: 24px; height: 24px; }
    .deco-snowflake--md { width: 40px; height: 40px; }
    .deco-snowflake--lg { width: 56px; height: 56px; }

    /* ─── Sparkles ─── */
    .deco-sparkle {
      color: var(--deco-sparkle);
      position: absolute;
      pointer-events: none;
      animation: sparkle-twinkle 4s ease-in-out infinite;
      will-change: transform, opacity;
      z-index: 3;
      display: inline-block;
    }
    .deco-sparkle--xs { width: 8px;  height: 8px;  }
    .deco-sparkle--sm { width: 14px; height: 14px; }
    .deco-sparkle--md { width: 20px; height: 20px; }
    .deco-sparkle--lg { width: 28px; height: 28px; }

    /* ─── Main Frame ─── */
    .main-frame {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      padding: 48px 48px 56px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      border: 1px solid var(--border-frame);
      border-radius: 2px;
    }
    .main-frame::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 0.5px solid var(--border-frame-inner);
      border-radius: 1px;
      pointer-events: none;
    }

    /* ─── Corner Ornaments ─── */
    .corner-ornament {
      position: absolute;
      width: 20px;
      height: 20px;
      pointer-events: none;
    }
    .corner-ornament::before,
    .corner-ornament::after {
      content: '';
      position: absolute;
      background: var(--border-frame);
    }
    .corner-ornament::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner-ornament::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .corner-ornament--tl { top: -1px;    left: -1px; }
    .corner-ornament--tr { top: -1px;    right: -1px;  transform: rotate(90deg); }
    .corner-ornament--bl { bottom: -1px; left: -1px;   transform: rotate(-90deg); }
    .corner-ornament--br { bottom: -1px; right: -1px;  transform: rotate(180deg); }

    /* ─── Header ─── */
    .site-header { text-align: center; }
    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: var(--fs-display);
      letter-spacing: var(--ls-display);
      color: var(--text-primary);
      font-style: italic;
    }
    .site-tagline {
      font-family: 'Noto Serif KR', serif;
      font-size: var(--fs-label);
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      margin-top: 8px;
    }

    /* ─── Search ─── */
    .search-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
    }
    .search-inner {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid var(--border-input);
      border-radius: 40px;
      padding: 0 8px 0 24px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .search-inner:focus-within {
      border-color: var(--border-input-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .word-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
      font-size: var(--fs-input);
      font-weight: 300;
      color: var(--text-primary);
      padding: 14px 0;
      letter-spacing: 0.05em;
    }
    .word-input::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }
    .search-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border-input);
      background: rgba(168, 164, 212, 0.15);
      color: var(--accent-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .search-btn:hover {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
      transform: scale(1.05);
    }

    /* ─── Tag Pills ─── */
    .suggestion-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .tag-pill {
      font-family: 'Jost', 'Noto Sans KR', sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid var(--border-card);
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }
    .tag-pill:hover {
      background: rgba(168, 164, 212, 0.15);
      border-color: var(--border-input-focus);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ─── Result Section ─── */
    .result-section {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .result-section.visible { opacity: 1; }

    /* ─── Palette Card ─── */
    .palette-card {
      background: var(--bg-frosted);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }
    .palette-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, var(--deco-dot) 1px, transparent 1px);
      background-size: 18px 18px;
      pointer-events: none;
      z-index: 0;
    }
    .palette-card__header {
      position: relative;
      z-index: 1;
      margin-bottom: 28px;
      text-align: center;
    }
    .palette-keyword {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 400;
      font-style: italic;
      color: var(--text-primary);
      letter-spacing: 0.2em;
      text-transform: lowercase;
    }
    .palette-subtitle {
      font-family: 'Jost', sans-serif;
      font-size: var(--fs-label);
      font-weight: 200;
      color: var(--text-muted);
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
    }

    /* ─── Color Swatches ─── */
    .color-swatches {
      display: flex;
      gap: 12px;
      position: relative;
      z-index: 1;
    }
    .color-swatch {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.2s ease;
      opacity: 0;
      animation: swatch-slide-up 0.5s ease forwards;
    }
    .color-swatch:hover { transform: translateY(-4px); }
    .color-swatch:nth-child(1) { animation-delay: 0.1s; }
    .color-swatch:nth-child(2) { animation-delay: 0.2s; }
    .color-swatch:nth-child(3) { animation-delay: 0.3s; }
    .color-swatch:nth-child(4) { animation-delay: 0.4s; }
    .color-swatch:nth-child(5) { animation-delay: 0.5s; }
    .color-swatch:nth-child(6) { animation-delay: 0.6s; }
    .swatch-bar {
      height: 80px;
      border-radius: 8px;
      background-color: var(--swatch-color);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
      transition: box-shadow 0.2s ease;
    }
    .color-swatch:hover .swatch-bar {
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
    .swatch-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-align: center;
    }
    .swatch-name {
      font-family: 'Jost', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }
    .swatch-name-ko {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--text-muted);
    }
    .hex-code {
      font-family: 'Jost', monospace;
      font-size: 0.65rem;
      font-weight: 200;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      cursor: copy;
      transition: color 0.2s ease;
    }
    .hex-code:hover { color: var(--text-label); }
    .hex-code.copied::after {
      content: ' ✓';
      color: var(--accent-primary);
    }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.7;
    }
    .empty-state__text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      color: var(--text-muted);
      font-size: 1rem;
      letter-spacing: 0.1em;
    }

    /* ─── Animations ─── */
    @keyframes page-fade-in {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes snowflake-float {
      0%, 100% { transform: translateY(0px)  rotate(0deg);   opacity: 0.55; }
      33%       { transform: translateY(-8px) rotate(15deg);  opacity: 0.70; }
      66%       { transform: translateY(4px)  rotate(-10deg); opacity: 0.45; }
    }
    @keyframes sparkle-twinkle {
      0%, 100% { transform: scale(1)   rotate(0deg);   opacity: 0.65; }
      25%       { transform: scale(1.3) rotate(45deg);  opacity: 1;    }
      50%       { transform: scale(0.8) rotate(90deg);  opacity: 0.4;  }
      75%       { transform: scale(1.1) rotate(135deg); opacity: 0.8;  }
    }
    @keyframes card-reveal {
      0%   { opacity: 0; transform: translateY(20px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0)    scale(1);    }
    }
    @keyframes swatch-slide-up {
      0%   { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0);    }
    }
    @keyframes ribbon-draw {
      0%   { stroke-dashoffset: 2000; opacity: 0;   }
      100% { stroke-dashoffset: 0;    opacity: 0.5; }
    }

    /* ─── Responsive ─── */
    @media (max-width: 600px) {
      .main-frame {
        padding: 28px 20px 36px;
        gap: 28px;
      }
      .color-swatches {
        flex-wrap: wrap;
        gap: 10px;
      }
      .color-swatch {
        flex: 0 0 calc(33.33% - 7px);
      }
      .palette-card { padding: 20px; }
      .deco-snowflake:nth-child(n+3) { display: none; }
    }
  </style>
</head>

    // ═══════════════════════════════════════════
    // Color Generation — Unknown Words
    // ═══════════════════════════════════════════
    function hashWord(word) {
      let hash = 5381;
      for (let i = 0; i < word.length; i++) {
        hash = ((hash << 5) + hash) + word.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function hslToHex(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * c).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }

    const HUE_NAMES = [
      { min: 0,   max: 15,  en: 'Red',    ko: '빨강' },
      { min: 15,  max: 45,  en: 'Orange', ko: '주황' },
      { min: 45,  max: 70,  en: 'Golden', ko: '황금' },
      { min: 70,  max: 155, en: 'Green',  ko: '초록' },
      { min: 155, max: 195, en: 'Teal',   ko: '청록' },
      { min: 195, max: 255, en: 'Blue',   ko: '파랑' },
      { min: 255, max: 290, en: 'Violet', ko: '보라' },
      { min: 290, max: 335, en: 'Pink',   ko: '핑크' },
      { min: 335, max: 360, en: 'Rose',   ko: '장미' },
    ];

    const SHADE = [
      { en: 'Deep',    ko: '깊은'     },
      { en: 'Dark',    ko: '짙은'     },
      { en: 'Pure',    ko: '맑은'     },
      { en: 'Soft',    ko: '부드러운' },
      { en: 'Pale',    ko: '연한'     },
    ];

    function getHueName(hue) {
      const h = ((hue % 360) + 360) % 360;
      for (const n of HUE_NAMES) {
        if (h >= n.min && h < n.max) return { en: n.en, ko: n.ko };
      }
      return { en: 'Rose', ko: '장미' };
    }

    function generatePalette(word) {
      const hash   = hashWord(word);
      const baseH  = hash % 360;
      const baseS  = 28 + (hash % 38);      // 28–65%
      const shifts = [0, 6, -5, 10, -8];    // hue micro-shifts per swatch
      const lights = [22, 36, 50, 66, 85];  // lightness steps

      const hueInfo = getHueName(baseH);

      return lights.map((l, i) => {
        const h = baseH + shifts[i];
        const s = Math.max(18, baseS - i * 5);
        return {
          hex:    hslToHex(h, s, l),
          name:   `${SHADE[i].en} ${hueInfo.en}`,
          nameKo: `${SHADE[i].ko} ${hueInfo.ko}`,
        };
      });
    }

    // ═══════════════════════════════════════════
    // Rendering
    // ═══════════════════════════════════════════
    function updateWatermark(word) {
      const el = document.getElementById('bgWatermark');
      el.style.opacity = '0';
      setTimeout(() => {
        el.textContent = (word || 'PALETTE').toUpperCase();
        el.style.opacity = '1';
      }, 300);
    }

    function renderPalette(keyword, colors) {
      updateWatermark(keyword);

      const swatches = colors.map((c, i) => `
        <div class="color-swatch" style="--swatch-color:${c.hex};animation-delay:${(i + 1) * 0.1}s">
          <div class="swatch-bar"></div>
          <div class="swatch-info">
            <span class="swatch-name">${c.name}</span>
            <span class="swatch-name-ko">${c.nameKo}</span>
            <span class="hex-code" title="클릭하여 복사" onclick="copyHex(this,'${c.hex}')">${c.hex}</span>
          </div>
        </div>
      `).join('');

      const card = document.getElementById('paletteCard');
      // Re-trigger animation
      card.style.animation = 'none';
      void card.offsetHeight;
      card.style.animation = 'card-reveal 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards';

      card.innerHTML = `
        <div class="palette-card__header">
          <span class="palette-keyword">${keyword}</span>
          <span class="palette-subtitle">${colors.length}가지 색채 팔레트</span>
        </div>
        <div class="color-swatches">${swatches}</div>
      `;

      document.getElementById('resultSection').classList.add('visible');
    }

    function copyHex(el, hex) {
      const doFeedback = () => {
        el.classList.add('copied');
        setTimeout(() => el.classList.remove('copied'), 1500);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(hex).then(doFeedback).catch(() => {
          fallbackCopy(hex); doFeedback();
        });
      } else {
        fallbackCopy(hex); doFeedback();
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    function search(word) {
      const trimmed = word.trim();
      if (!trimmed) return;
      const key    = trimmed.toLowerCase();
      const colors = PALETTE_MAP[key] || PALETTE_MAP[trimmed] || generatePalette(trimmed);
      renderPalette(trimmed, colors);
      document.getElementById('wordInput').value = trimmed;
    }

    // ═══════════════════════════════════════════
    // Events
    // ═══════════════════════════════════════════
    document.getElementById('searchForm').addEventListener('submit', e => {
      e.preventDefault();
      search(document.getElementById('wordInput').value);
    });

    document.getElementById('suggestionTags').addEventListener('click', e => {
      const pill = e.target.closest('.tag-pill');
      if (!pill) return;
      search(pill.dataset.word);
    });

    document.getElementById('wordInput').addEventListener('input', e => {
      updateWatermark(e.target.value);
    });

    // Auto-focus
    document.getElementById('wordInput').focus();
