<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pastelette — 단어 하나가 색채 세계로 번역되는 순간. AI가 단어의 의미를 분석해 어울리는 색 팔레트를 추천합니다.">
  <title>Pastelette — 단어가 색채로</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/decorations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/palette.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body class="page-root">

      <line x1="20" y1="2"  x2="20" y2="38" stroke="currentColor" stroke-width="1"/>

    <svg class="deco-sparkle deco-sparkle--sm" style="top:31%;left:44%;animation-delay:-1.7s"

      <path d="M8 0C8 0 8.3 4 8 8C7.7 4 8 0 8 0Z"        fill="currentColor"/>
      <path d="M16 8C16 8 12 7.7 8 8C12 8.3 16 8 16 8Z"  fill="currentColor"/>

    </svg>
    <svg class="deco-sparkle deco-sparkle--xs" style="top:89%;right:38%;animation-delay:-0.9s"
         width="8" height="8" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 0C8 0 8.3 4 8 8C7.7 4 8 0 8 0Z"        fill="currentColor"/>

    <!-- Cross decorations -->
    <span class="deco-cross" style="top:12%;left:32%" aria-hidden="true"></span>
    <span class="deco-cross" style="top:48%;right:10%" aria-hidden="true"></span>
    <span class="deco-cross" style="top:82%;left:18%" aria-hidden="true"></span>
    <span class="deco-cross" style="top:35%;right:32%" aria-hidden="true"></span>

  </div><!-- /bg-layer -->


  <!-- ════════════════════════════════════════
       SETTINGS MODAL (optional user API key)
  ════════════════════════════════════════ -->
  <div class="modal-overlay" id="modalOverlay"
       role="dialog" aria-modal="true" aria-label="API 설정">
    <div class="settings-panel">
      <button class="modal-close" id="modalClose" aria-label="닫기">✕</button>

      <h2 class="settings-title">API 설정</h2>
      <p class="settings-desc">
        Pastelette는 <strong>기본적으로 무료 AI</strong>로 동작합니다.
        더 정교한 분석을 원하신다면 개인 API 키를 추가하세요.
        키는 브라우저에만 저장되며 외부로 전송되지 않습니다.<br><br>
        Gemini 무료 키 발급 →&nbsp;
        <a href="https://aistudio.google.com/app/apikey"
           target="_blank" rel="noopener">Google AI Studio</a>
      </p>

      <div class="settings-field">
        <label class="settings-label" for="apiService">서비스</label>
        <select class="settings-select" id="apiService">
          <option value="gemini">Google Gemini (무료 · 권장)</option>
          <option value="openai">OpenAI GPT-4o mini</option>
        </select>
      </div>

      <div class="settings-field">
        <label class="settings-label" for="apiKeyInput">API 키 (선택)</label>
        <input class="settings-input" id="apiKeyInput" type="password"
               placeholder="키를 입력하세요" autocomplete="off" spellcheck="false"/>
      </div>

      <div class="settings-actions">
        <button class="btn-save"   id="btnSave">저장</button>
        <button class="btn-cancel" id="btnCancel">취소</button>
        <button class="btn-clear"  id="btnClear" title="저장된 키 삭제">삭제</button>
      </div>
    </div>
  </div><!-- /modal -->


  <!-- ════════════════════════════════════════
       MAIN FRAME
  ════════════════════════════════════════ -->
  <main class="main-frame" role="main">
    <!-- Corner ornaments -->
    <div class="corner-ornament corner-ornament--tl" aria-hidden="true"></div>
    <div class="corner-ornament corner-ornament--tr" aria-hidden="true"></div>
    <div class="corner-ornament corner-ornament--bl" aria-hidden="true"></div>
    <div class="corner-ornament corner-ornament--br" aria-hidden="true"></div>

    <!-- ── Header ── -->
    <header class="site-header">
      <h1 class="site-title">Pastelette</h1>
      <p class="site-tagline">단어가 색채로 번역되는 순간</p>
      <span class="ai-badge ai-badge--free" id="aiBadge">AI 분석 · 무료</span>

      <!-- Settings gear -->
      <button class="settings-btn" id="settingsBtn"
              aria-label="API 설정" title="선택: 개인 API 키 설정">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="7" cy="7" r="2.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M7 1v1.5M7 11.5V13M13 7h-1.5M2.5 7H1
                   M11.24 2.76l-1.06 1.06M3.82 10.18l-1.06 1.06
                   M11.24 11.24l-1.06-1.06M3.82 3.82L2.76 2.76"
                stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- ── Search ── -->
    <section class="search-section" aria-label="단어 검색">
      <form class="search-form" id="searchForm" role="search">
        <div class="search-wrapper">
          <div class="search-inner">
            <input
              class="word-input"
              id="wordInput"
              type="search"
              placeholder="단어를 입력하세요 — forest, 그리움, nostalgia..."
              autocomplete="off"
              spellcheck="false"
              aria-label="색채를 번역할 단어"
            />
            <button class="search-btn" id="searchBtn" type="submit" aria-label="색채 추천">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"
                   xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 9H15M10 4L15 9L10 14"
                      stroke="currentColor" stroke-width="1"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </form>

      <div class="suggestion-tags" id="suggestionTags" role="list" aria-label="추천 단어">
        <button class="tag-pill" data-word="forest"    role="listitem">forest</button>
        <button class="tag-pill" data-word="ocean"     role="listitem">ocean</button>
        <button class="tag-pill" data-word="sunset"    role="listitem">sunset</button>
        <button class="tag-pill" data-word="그리움"    role="listitem">그리움</button>
        <button class="tag-pill" data-word="봄"        role="listitem">봄</button>
        <button class="tag-pill" data-word="winter"    role="listitem">winter</button>
        <button class="tag-pill" data-word="cozy"      role="listitem">cozy</button>
        <button class="tag-pill" data-word="마음"      role="listitem">마음</button>
        <button class="tag-pill" data-word="midnight"  role="listitem">midnight</button>
        <button class="tag-pill" data-word="가을"      role="listitem">가을</button>
        <button class="tag-pill" data-word="lavender"  role="listitem">lavender</button>
        <button class="tag-pill" data-word="rain"      role="listitem">rain</button>
      </div>
    </section>

    <!-- ── Result ── -->
    <section class="result-section" id="resultSection" aria-live="polite" aria-label="팔레트 결과">
      <div class="palette-card" id="paletteCard">
        <div class="empty-state">
          <svg class="empty-state__icon" width="32" height="32" viewBox="0 0 16 16"
               fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M8 0C8 0 8.4 5 8 8C7.6 5 8 0 8 0Z"       fill="currentColor"/>
            <path d="M16 8C16 8 11 7.6 8 8C11 8.4 16 8 16 8Z" fill="currentColor"/>
            <path d="M8 16C8 16 7.6 11 8 8C8.4 11 8 16 8 16Z" fill="currentColor"/>
            <path d="M0 8C0 8 5 8.4 8 8C5 7.6 0 8 0 8Z"       fill="currentColor"/>
          </svg>
          <p class="empty-state__text">
            단어 하나가 색채 세계로 번역됩니다<br>
            <small style="font-size:0.8em;letter-spacing:0.05em;">AI가 의미를 분석해 어울리는 색을 찾아드립니다</small>
          </p>
        </div>
      </div>
    </section>

  </main><!-- /main-frame -->

  <!-- Scripts — order matters -->
  <script src="js/color-utils.js"></script>
  <script src="js/palette-data.js"></script>
  <script src="js/ai-service.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
